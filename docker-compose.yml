services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: eorzea
      POSTGRES_PASSWORD: eorzea
      POSTGRES_DB: eorzea_market
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: "postgresql+asyncpg://eorzea:eorzea@db:5432/eorzea_market"
      DATABASE_URL_SYNC: "postgresql+psycopg2://eorzea:eorzea@db:5432/eorzea_market"
    depends_on:
      - db
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev

volumes:
  pgdata:
